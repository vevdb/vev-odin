name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            platform: darwin-aarch64
          - runner: macos-15-intel
            platform: darwin-x86_64
          - runner: ubuntu-24.04
            platform: linux-x86_64
          - runner: ubuntu-24.04-arm
            platform: linux-aarch64
          - runner: windows-2025
            platform: windows-x86_64

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
      - uses: laytan/setup-odin@v2.12.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Smoke published VevDB SDK
        run: scripts/smoke_release.sh
